name: SkillBridge CD

on:
  workflow_dispatch:

jobs:
  verify:
    name: Verify Before Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Verify frontend
        run: |
          npm run lint
          npm run typecheck
          npm run build
        working-directory: frontend

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Verify backend
        run: |
          npm run typecheck
          npm test
          npm run build
        working-directory: backend

      - name: Build backend Docker image
        run: docker build -t skillbridge-api:cd .
        working-directory: backend

  deploy-backend:
    name: Deploy Backend To Railway
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        run: railway up --service "${{ secrets.RAILWAY_SERVICE_ID }}" --detach
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Deployment note
        run: |
          echo "Backend deploy command completed."
          echo "Frontend deployment is expected to be handled by Vercel Git integration."
